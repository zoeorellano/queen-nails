<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acceso Gestión - Queen Nails</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Beth+Ellen&family=Outfit:wght@100..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css" />
</head>

<body class="bg-white text-black font-raleway d-flex flex-column min-vh-100">

    <nav class="navbar navbar-light bg-white border-bottom border-secondary py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="index.html">
                <img src="assets/imagenes/logoqn.png" alt="Logo" height="35">
            </a>
            <a href="index.html" class="btn btn-outline-dark btn-sm rounded-pill font-outfit px-3">← Volver a la web</a>
        </div>
    </nav>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
        
        <!-- SECCIÓN LOGIN -->
        <section id="login-section" class="container w-100" style="max-width: 480px;">
            <div class="border border-dark rounded-4 p-4 p-lg-5 shadow-sm bg-white">
                <h2 class="font-whitecapel fs-1 mb-1 text-center">Ingresar</h2>
                <p class="font-raleway text-muted mb-4 text-center" style="font-size: .9rem;">Área exclusiva para administración del sitio.</p>

                <div class="mb-3">
                    <label class="admin-label font-outfit" for="input-user">Usuario</label>
                    <input class="admin-input font-outfit" type="text" id="input-user" autocomplete="username" />
                </div>
                <div class="mb-4">
                    <label class="admin-label font-outfit" for="input-pass">Contraseña</label>
                    <input class="admin-input font-outfit" type="password" id="input-pass" autocomplete="current-password" />
                </div>

                <p class="font-outfit text-danger mb-3 text-center" id="login-error" style="font-size: .85rem; min-height: 1.2em;"></p>

                <button class="btn btn-dark rounded-pill px-5 py-2 font-outfit fw-bold w-100" id="btn-login">
                    Ingresar
                </button>
            </div>
        </section>

        <!-- PANEL DE GESTIÓN -->
        <section id="admin-section" class="container" style="display: none;">
            <div class="border border-dark rounded-4 p-4 p-lg-5 bg-white shadow-sm">
                <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center mb-4 pb-3 border-bottom border-secondary gap-2">
                    <div>
                        <h3 class="font-whitecapel fs-2 mb-1">Modificar precios</h3>
                        <p class="font-raleway text-muted mb-0" style="font-size: .9rem;">
                            Editá los valores y hacé clic en <strong>Guardar cambios</strong>. Los precios se actualizan automáticamente en la web.
                        </p>
                    </div>
                    <button class="btn btn-outline-secondary btn-sm rounded-pill px-3 font-outfit align-self-start" id="btn-cerrar-sesion">Cerrar sesión</button>
                </div>

                <div class="row g-3 my-3" id="admin-price-grid"></div>

                <div class="d-flex flex-column flex-sm-row gap-3 mt-5">
                    <button class="btn btn-dark rounded-pill px-5 py-2 font-outfit fw-bold" id="btn-guardar">
                        Guardar cambios
                    </button>
                    <button class="btn btn-outline-dark rounded-pill px-4 py-2 font-outfit" id="btn-resetear">
                        Restaurar precios originales
                    </button>
                </div>
            </div>
        </section>

    </main>

    <!-- Ventana flotante de confirmación -->
    <div class="modal fade" id="modalExito" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border border-dark rounded-4 shadow p-3 text-center font-outfit">
                <div class="modal-body">
                    <div class="fs-2 mb-2">✅</div>
                    <h5 class="fw-bold mb-1">¡Cambios guardados!</h5>
                    <p class="text-muted small font-raleway mb-3">Los precios se ven actualizados en tu página.</p>
                    <button type="button" class="btn btn-dark btn-sm rounded-pill px-4 w-100" data-bs-dismiss="modal">Aceptar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
</body>

</html>
